name: Auto-update GTA5RP DB

on:
  schedule:
    - cron: '0 0 * * *' # Запускается каждый день в полночь по UTC
  workflow_dispatch: # Позволяет запускать вручную

jobs:
  update-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run parser
        run: node index.js
        env:
          SCRAPINGANT_API_KEY: ${{ secrets.SCRAPINGANT_API_KEY }}

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/ || echo "No output to add"
          git commit -m "Автоматическое обновление базы законов GTA5RP" || echo "Нет изменений для коммита"
          git push
